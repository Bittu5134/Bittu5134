  </g>

  <g class="stagger" style="animation-delay: 900ms">
    <rect x="25" y="115" width="60" height="22" rx="5" class="pill"/>
    <text x="55" y="130" text-anchor="middle" class="item-text" fill="#2496ED">Docker</text>
  </g>
  <g class="stagger" style="animation-delay: 1000ms">
    <rect x="95" y="115" width="80" height="22" rx="5" class="pill"/>
    <text x="135" y="130" text-anchor="middle" class="item-text" fill="#F38020">Cloudflare</text>
  </g>
  <g class="stagger" style="animation-delay: 1100ms">
