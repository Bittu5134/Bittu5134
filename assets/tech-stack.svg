<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg" role="img">
  <style>
    /* CSS Variables for Theme Switching */
    :root {
      --color-bg: #fffefe;
      --color-header: #2f80ed;
      --color-pill-bg: #f5f5f5; 
      --color-pill-stroke: #e4e2e2;
      --pill-stroke-opacity: 1;
    }

    @media (prefers-color-scheme: dark) {
      --color-bg: #011627;
      --color-header: #c792ea;
      --color-pill-bg: #0a1e2e;
      --color-pill-stroke: #ffffff;
      --pill-stroke-opacity: 0.1;
    }

    .card-bg { fill: var(--color-bg); }
    .header { font: 600 1.2em 'Segoe UI', Ubuntu, Sans-Serif; fill: var(--color-header); }
    .item-text { font: 600 0.9em 'Segoe UI', Ubuntu, Sans-Serif; }
    .pill { 
      fill: var(--color-pill-bg); 
      stroke: var(--color-pill-stroke); 
      stroke-opacity: var(--pill-stroke-opacity); 
    }
    
    /* Smooth Fade-in Animation */
    .stagger { opacity: 0; animation: fadeIn 0.4s ease-in-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <rect width="495" height="195" rx="4.5" class="card-bg"/>
  
  <text x="30" y="35" class="header">Technical Stack</text>

  <g class="stagger" style="animation-delay: 100ms">
    <rect x="30" y="60" width="75" height="24" rx="5" class="pill"/>
    <text x="67.5" y="77" text-anchor="middle" class="item-text" fill="#3776AB">Python</text>
  </g>
  <g class="stagger" style="animation-delay: 200ms">
    <rect x="115" y="60" width="95" height="24" rx="5" class="pill"/>
    <text x="162.5" y="77" text-anchor="middle" class="item-text" fill="#3178C6">TypeScript</text>
  </g>
  <g class="stagger" style="animation-delay: 300ms">
    <rect x="220" y="60" width="80" height="24" rx="5" class="pill"/>
    <text x="260" y="77" text-anchor="middle" class="item-text" fill="#339933">Node.js</text>
  </g>
  <g class="stagger" style="animation-delay: 400ms">
    <rect x="310" y="60" width="90" height="24" rx="5" class="pill"/>
    <text x="355" y="77" text-anchor="middle" class="item-text" fill="#FF3E00">SvelteKit</text>
  </g>

  <g class="stagger" style="animation-delay: 500ms">
    <rect x="30" y="94" width="105" height="24" rx="5" class="pill"/>
    <text x="82.5" y="111" text-anchor="middle" class="item-text" fill="#06B6D4">TailwindCSS</text>
  </g>
  <g class="stagger" style="animation-delay: 600ms">
    <rect x="145" y="94" width="80" height="24" rx="5" class="pill"/>
    <text x="185" y="111" text-anchor="middle" class="item-text" fill="#5A0EF8">DaisyUI</text>
  </g>
  <g class="stagger" style="animation-delay: 700ms">
    <rect x="235" y="94" width="95" height="24" rx="5" class="pill"/>
    <text x="282.5" y="111" text-anchor="middle" class="item-text" fill="#4169E1">PostgreSQL</text>
  </g>
  <g class="stagger" style="animation-delay: 800ms">
    <rect x="340" y="94" width="90" height="24" rx="5" class="pill"/>
    <text x="385" y="111" text-anchor="middle" class="item-text" fill="#47A248">MongoDB</text>
  </g>

  <g class="stagger" style="animation-delay: 900ms">
    <rect x="30" y="128" width="75" height="24" rx="5" class="pill"/>
    <text x="67.5" y="145" text-anchor="middle" class="item-text" fill="#2496ED">Docker</text>
  </g>
  <g class="stagger" style="animation-delay: 1000ms">
    <rect x="115" y="128" width="95" height="24" rx="5" class="pill"/>
    <text x="162.5" y="145" text-anchor="middle" class="item-text" fill="#F38020">Cloudflare</text>
  </g>
  <g class="stagger" style="animation-delay: 1100ms">
    <rect x="220" y="128" width="65" height="24" rx="5" class="pill"/>
    <text x="252.5" y="145" text-anchor="middle" class="item-text" fill="#FCC624">Linux</text>
  </g>
  <g class="stagger" style="animation-delay: 1200ms">
    <rect x="295" y="128" width="55" height="24" rx="5" class="pill"/>
    <text x="322.5" y="145" text-anchor="middle" class="item-text" fill="#F05033">Git</text>
  </g>

  <g class="stagger" style="animation-delay: 1300ms">
    <rect x="30" y="162" width="70" height="24" rx="5" class="pill"/>
    <text x="65" y="179" text-anchor="middle" class="item-text" fill="#4479A1">MySQL</text>
  </g>
  <g class="stagger" style="animation-delay: 1400ms">
    <rect x="110" y="162" width="80" height="24" rx="5" class="pill"/>
    <text x="150" y="179" text-anchor="middle" class="item-text" fill="#00979D">Arduino</text>
  </g>
  <g class="stagger" style="animation-delay: 1500ms">
    <rect x="200" y="162" width="70" height="24" rx="5" class="pill"/>
    <text x="235" y="179" text-anchor="middle" class="item-text" fill="#FA5C5C">Itch.io</text>
  </g>
</svg>
