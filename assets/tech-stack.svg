  </g>
  <g class="stagger" style="animation-delay: 1400ms">
    <rect x="95" y="145" width="70" height="22" rx="5" class="pill"/>
    <text x="130" y="160" text-anchor="middle" class="item-text" fill="#00979D">Arduino</text>
  </g>
  <g class="stagger" style="animation-delay: 1500ms">
    <rect x="175" y="145" width="60" height="22" rx="5" class="pill"/>
