<style>
  .letter-0, .letter-1, .letter-2, .letter-3, .letter-4, .letter-5 {
    fill: none; stroke: #f97316; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
    animation-duration: 1.7s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
  }

  @media (prefers-color-scheme: light) {
    fill: none; stroke: #d0520e; stroke-width: 3;
  }

  .letter-0 { stroke-dasharray: 566.6; stroke-dashoffset: 566.6; animation-name: write0; animation-delay: 0s; }
  .letter-1 { stroke-dasharray: 208.85; stroke-dashoffset: 208.85; animation-name: write1; animation-delay: 0.255s; }
  .letter-2 { stroke-dasharray: 373.86; stroke-dashoffset: 373.86; animation-name: write2; animation-delay: 0.510s; }
  .letter-3 { stroke-dasharray: 373.86; stroke-dashoffset: 373.86; animation-name: write3; animation-delay: 0.765s; }
  .letter-4 { stroke-dasharray: 273.78; stroke-dashoffset: 273.78; animation-name: write4; animation-delay: 1.020s; }
  
  /* Fixed Underline CSS */
  .letter-5 { 
    stroke-dasharray: 260; 
    stroke-dashoffset: 260; 
    animation-name: write5; 
    animation-delay: 1.275s; 
  }

  @keyframes write0 { to { stroke-dashoffset: 0; } }
  @keyframes write1 { to { stroke-dashoffset: 0; } }
  @keyframes write2 { to { stroke-dashoffset: 0; } }
  @keyframes write3 { to { stroke-dashoffset: 0; } }
  @keyframes write4 { to { stroke-dashoffset: 0; } }
  @keyframes write5 { to { stroke-dashoffset: 0; } }
</style>

